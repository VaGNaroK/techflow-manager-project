<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTask Kanban</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="app-header">
        <h1>LogiTask</h1>
        <button id="btn-nova-tarefa">Nova Tarefa</button>
    </header>

    <main class="kanban-board">
        <section class="kanban-column" id="col-a-fazer">
            <h2>A Fazer</h2>
            <div class="task-list" data-status="A Fazer"></div>
        </section>

        <section class="kanban-column" id="col-em-progresso">
            <h2>Em Progresso</h2>
            <div class="task-list" data-status="Em Progresso"></div>
        </section>

        <section class="kanban-column" id="col-concluido">
            <h2>Concluído</h2>
            <div class="task-list" data-status="Concluído"></div>
        </section>
    </main>

    <!-- Modal Nova Tarefa -->
    <div id="modal-tarefa" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Nova Tarefa</h2>
            <form id="form-tarefa">
                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" required>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao"></textarea>
                </div>
                <div class="form-group">
                    <label for="prioridade">Prioridade</label>
                    <select id="prioridade">
                        <option value="Baixa">Baixa</option>
                        <option value="Média" selected>Média</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>
                <button type="submit">Salvar Tarefa</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
